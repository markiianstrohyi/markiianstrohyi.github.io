<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <!-- SEO -->
  {% seo %}

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
    <nav>
      <a href="https://github.com/markiianstrohyi" target="_blank">GitHub</a>
      <a href="https://www.linkedin.com/in/markiian-strohyi-a50186252/" target="_blank">LinkedIn</a>
      <a href="mailto:{{ site.email }}">Email</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>© {{ site.time | date: "%Y" }} {{ site.author }}</p>
    <p><a href="https://github.com/markiianstrohyi" target="_blank">View all projects on GitHub →</a></p>
  </footer>
</body>
</html>
